<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-label="Postcard from the Future artefact placeholder">
  <defs>
    <radialGradient id="pc-floor" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1B1B1B"/>
    </radialGradient>
    <linearGradient id="pc-paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4ECE3"/>
      <stop offset="100%" stop-color="#E4D4C2"/>
    </linearGradient>
    <linearGradient id="pc-back" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C4724E"/>
      <stop offset="100%" stop-color="#A55E3D"/>
    </linearGradient>
  </defs>

  <rect width="800" height="1000" fill="url(#pc-floor)"/>

  <!-- back card (postcard back, partially visible behind) -->
  <g transform="translate(140, 110) rotate(-3)">
    <rect width="540" height="360" rx="6" fill="url(#pc-back)" stroke="#3a1f10" stroke-width="1"/>
    <line x1="270" y1="40" x2="270" y2="320" stroke="#F2E9E1" stroke-width="1.5" opacity="0.55"/>
    <text x="40" y="70" font-family="Inter, sans-serif" font-size="11"
          fill="#F2E9E1" letter-spacing="0.18em" opacity="0.85">DISPATCH NO. 01</text>
    <text x="40" y="120" font-family="Fraunces, Georgia, serif" font-style="italic"
          font-size="22" fill="#F2E9E1">Two quarters from now,</text>
    <text x="40" y="150" font-family="Fraunces, Georgia, serif" font-style="italic"
          font-size="22" fill="#F2E9E1">the room felt different.</text>
    <text x="40" y="184" font-family="Fraunces, Georgia, serif" font-style="italic"
          font-size="22" fill="#F2E9E1">You said yes on a Tuesday.</text>
    <text x="40" y="240" font-family="Inter, sans-serif" font-size="13"
          fill="#F2E9E1" opacity="0.85">from a future you have not lived yet</text>

    <!-- stamp -->
    <rect x="460" y="34" width="58" height="74" fill="#F2E9E1"/>
    <text x="489" y="68" text-anchor="middle"
          font-family="Fraunces, Georgia, serif" font-weight="600"
          font-size="22" fill="#1B1B1B">S</text>
    <text x="489" y="92" text-anchor="middle"
          font-family="Inter, sans-serif" font-size="8"
          fill="#1B1B1B" letter-spacing="0.18em">SENTRADA</text>

    <!-- address lines -->
    <line x1="290" y1="170" x2="490" y2="170" stroke="#F2E9E1" opacity="0.6"/>
    <line x1="290" y1="200" x2="490" y2="200" stroke="#F2E9E1" opacity="0.6"/>
    <line x1="290" y1="230" x2="490" y2="230" stroke="#F2E9E1" opacity="0.6"/>
    <line x1="290" y1="260" x2="490" y2="260" stroke="#F2E9E1" opacity="0.6"/>
  </g>

  <!-- front card -->
  <g transform="translate(110, 380) rotate(2)">
    <rect width="580" height="400" rx="6" fill="url(#pc-paper)" stroke="#cdbfae" stroke-width="1"/>
    <!-- inner border -->
    <rect x="22" y="22" width="536" height="356" fill="none" stroke="#1B1B1B" stroke-width="1"/>
    <rect x="30" y="30" width="520" height="340" fill="none" stroke="#1B1B1B" stroke-width="0.5"/>

    <text x="290" y="120" text-anchor="middle"
          font-family="Inter, sans-serif" font-size="12"
          fill="#5a4a3a" letter-spacing="0.32em">POSTCARD FROM THE FUTURE</text>

    <text x="290" y="200" text-anchor="middle"
          font-family="Fraunces, Georgia, serif" font-style="italic"
          font-size="40" fill="#1B1B1B" letter-spacing="-0.01em">It worked,</text>
    <text x="290" y="252" text-anchor="middle"
          font-family="Fraunces, Georgia, serif" font-style="italic"
          font-size="40" fill="#C4724E" letter-spacing="-0.01em">in the end.</text>

    <line x1="180" y1="290" x2="400" y2="290" stroke="#1B1B1B" stroke-width="1"/>
    <text x="290" y="322" text-anchor="middle"
          font-family="Fraunces, Georgia, serif" font-style="italic"
          font-size="16" fill="#1B1B1B">[City] · [Future Date]</text>
  </g>

  <!-- shadow under stack -->
  <ellipse cx="400" cy="830" rx="280" ry="14" fill="#000" opacity="0.45"/>
</svg>
