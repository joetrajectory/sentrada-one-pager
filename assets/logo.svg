<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 64" role="img" aria-label="sentrada">
  <defs>
    <style>
      .wm { font-family: 'Fraunces', 'Times New Roman', Georgia, serif; font-weight: 500; font-size: 56px; letter-spacing: -0.01em; }
    </style>
    <mask id="cut-mask">
      <rect width="100%" height="100%" fill="white"/>
      <!-- diagonal cut crossing only the s -->
      <rect x="-2" y="30" width="34" height="3.4" fill="black" transform="rotate(-32 15 32)"/>
    </mask>
  </defs>
  <g fill="#F2E9E1" mask="url(#cut-mask)">
    <text x="0" y="50" class="wm">sentrada</text>
  </g>
</svg>
